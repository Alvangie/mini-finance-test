<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniFinance - Inicio</title>
    <link rel="stylesheet" href="resources/style.css">
    <link rel="stylesheet" href="resources/sidebar/sidebar.css">
    <link rel="stylesheet" href="resources/sidebar/logo.css">
    <link rel="stylesheet" href="resources/sidebar/icono-sidebar.css">
    <link rel="stylesheet" href="resources/sidebar/toggleButton.css">
    <link rel="stylesheet" href="resources/footer.css">
</head>

<body>
    <div class="layout">

        <!-- 🔹 SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <h1>
                    <span class="mini">Mini</span><span class="finance">Finance</span>
                </h1>
            </div>
            <!-- Navegación -->
            <nav>
                <ul>
                    <li><a href="inicio.html">
                            <span class="icono-inicio"></span>
                            Inicio
                        </a></li>
                    <li><a href="simulador.html" class="active">
                            <span class="icono-simulador"></span>
                            Simulador
                        </a></li>
                </ul>
            </nav>
            <hr>
            <!-- Meta -->
            <section>

                <h2>Meta</h2>
                <input type="number" id="metaInput" placeholder="Meta">
                <button onclick="guardarMeta()">Guardar</button>

                <p id="metaTexto">$0</p>
            </section>

        </aside>
        <!-- 🔹 MAIN -->
        <main>
            <!-- Encabezado -->
            <header>
                <h2>Datos Financieros</h2>
                <div class="toggleButton" id="toggleButton">
                    <span class="line-Button"></span>
                </div>
            </header>
            <button onclick="borrarTodo()">🗑️ Resetear datos</button>
            <!-- Datos financieros -->
            <section>
                <p>Ingresos: $<span id="ingresos">0</span></p>
                <p>Gastos: $<span id="gastos">0</span></p>
                <p>Saldo: $<span id="saldo">0</span></p>

                <div id="alertas"></div>
            </section>
            <hr>
            <div class="contenedor-movimientos">

                <!-- 🔹 IZQUIERDA: FORMULARIO -->
                <section class="panel">
                    <h2>Agregar movimiento</h2>

        <form onsubmit="agregarMovimiento(); return false;">
            <label>Tipo:</label>
            <div class="tipo-toggle">

    <button 
        type="button" 
        class="activo" 
        id="btnIngreso">
        Ingreso
    </button>

    <button 
        type="button" 
        id="btnGasto">
        Gasto
    </button>

</div>

<input type="hidden" id="tipo" value="ingreso">


                        <label>Monto:</label>
                        <input type="number" id="monto" placeholder="Monto">

                        <label>Categoría:</label>
                        <select id="categoria">
                            <option>Sueldo</option>
                            <option>Comida</option>
                            <option>Transporte</option>
                            <option>Regalos</option>
                            <option>Ocio</option>
                        </select>

                        <label>Frecuencia:</label>
                        <select id="frecuencia">
                            <option value="unico">Una vez</option>
                            <option value="mensual">Mensual</option>
                            <option value="semanal">Semanal</option>
                        </select>

                        <button type="submit">Agregar</button>
                    </form>
                </section>

                <!-- 🔹 DERECHA: MOVIMIENTOS -->
                <section class="panel">
                    <div class="encabezado-movimientos">
                        <h2>Movimientos recientes</h2>
                        <button class="btn-ver-todos" aria-label="Ver Todos">Ver todos</button>
                    </div>
                    <div id="listaMovimientos"></div>
                </section>

            </div>
        </main>
    </div>
    <script type="module" src="js/main.js"></script>
</body>

</html>
