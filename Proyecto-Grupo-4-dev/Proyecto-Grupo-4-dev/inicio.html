<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniFinance - Inicio</title>
    <link rel="stylesheet" href="resources/style.css">
    <link rel="stylesheet" href="resources/sidebar/sidebar.css">
    <link rel="stylesheet" href="resources/sidebar/logo.css">
    <link rel="stylesheet" href="resources/sidebar/icono-sidebar.css">
    <link rel="stylesheet" href="resources/sidebar/toggleButton.css">
    <link rel="stylesheet" href="resources/footer.css">
</head>

<body>
    <div class="layout">

        <!-- 🔹 SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <h1>
                    <span class="mini">Mini</span><span class="finance">Finance</span>
                </h1>
            </div>
            <!-- Navegación -->
            <nav>
                <ul>
                    <li><a href="inicio.html">
                            <span class="icono-inicio"></span>
                            Inicio
                        </a></li>
                    <li><a href="simulador.html" class="active">
                            <span class="icono-simulador"></span>
                            Simulador
                        </a></li>
                </ul>
            </nav>
            <hr>
            <!-- Meta -->

           <section class="panel-meta-" id="tarjeta-meta-ahorro">
              <header class="meta--header">
    <span class="meta-icon-design" style="display: inline-block !important; font-size: 16px !important; font-weight: bold !important; margin-right: 2px !important;">◎</span>
    <h3>Meta de ahorro</h3>
</header>
                <article class="meta--body">
                    <h4 id="txt-meta-nombre">Ahorrar para mi viaje</h4>
                    <p class="monto-destacado-" id="metaTexto">$0</p>
                    
                    <div class="form-meta-input">
                        <input type="number" id="metaInput" placeholder="Ej: 500000">
                        <button onclick="guardarMeta()">Fijar</button>
                    </div>

                    <div class="meta-progreso-badge">
                        <span id="txt-meta-porcentaje">0% completado</span>
                    </div>

                    <progress id="barra-progreso-nativa" value="0" max="100"></progress>
                    
                    <div class="bloque-totales-meta">
                        <span id="txt-meta-ahorrado">$0</span> ahorrado
                        <br>
                        de <span id="txt-meta-objetivo-fijo">$0</span>
                    </div>
                </article>

 <footer>
    <button class="btn-ver-metas-" onclick="irAMetas()">
        Ver metas
    </button>
</footer>
            </section>
            
            <section class="panel-control-tema" aria-label="Selector de tema visual">
                <span id="icono-estado-tema" aria-hidden="true">☾</span>
                <label for="input-switch-tema" class="label-tema">Modo oscuro</label>
                <label class="switch-contenedor-estetico">
                    <input type="checkbox" id="input-switch-tema">
                    <span class="slider-redondeado-dinamico"></span>
                </label>
            </section>
        </aside>

        <!-- 🔹 MAIN -->
        <main>
            <!-- Encabezado -->
            <header>
                <h2>Datos Financieros</h2>
                <div class="toggleButton" id="toggleButton">
                    <span class="line-Button"></span>
                </div>
            </header>
            <button onclick="borrarTodo()">🗑️ Resetear datos</button>
            <!-- Datos financieros -->
            <section>
                <p>Ingresos: $<span id="ingresos">0</span></p>
                <p>Gastos: $<span id="gastos">0</span></p>
                <p>Saldo: $<span id="saldo">0</span></p>
                <div id="alertas"></div>
            </section>
            <hr>

            <div class="contenedor-movimientos">

                <!-- 🔹 IZQUIERDA: FORMULARIO -->
                <section class="panel">
                    <h2>Agregar movimiento</h2>

        <form onsubmit="agregarMovimiento(); return false;">
            <label>Tipo:</label>
            <div class="tipo-toggle">
    <button 
        type="button" 
        class="activo" 
        id="btnIngreso">
        Ingreso
    </button>

    <button 
        type="button" 
        id="btnGasto">
        Gasto
    </button>

</div>

<input type="hidden" id="tipo" value="ingreso">


                        <label>Monto:</label>
                        <input type="number" id="monto" placeholder="Monto">

                        <label>Categoría:</label>
                        <select id="categoria">
                            <option>Sueldo</option>
                            <option>Comida</option>
                            <option>Transporte</option>
                            <option>Regalos</option>
                            <option>Ocio</option>
                        </select>

                        <label>Frecuencia:</label>
                        <select id="frecuencia">
                            <option value="unico">Una vez</option>
                            <option value="mensual">Mensual</option>
                            <option value="semanal">Semanal</option>
                        </select>

                        <button type="submit">Agregar</button>
                    </form>
                </section>

                <!-- 🔹 DERECHA: MOVIMIENTOS -->
                    <section class="panel-derecho-agrupado" style="display:flex; flex-direction:column; gap:20px; flex:1;">
                    <!-- Gráfico de Dona/Tarea de Angie -->
<section class="panel panel-grafico" id="contenedor-analitica-gastos">
                        <h2>Gastos por categoría</h2>
                        <section class="bloque-visual-grafica" style="display:flex; justify-content:center; margin:15px 0;">
                            <div class="wrapper-dona-grafica" style="width: 120px; height: 120px; border-radius: 50%; background: conic-gradient(#22c55e 0% 35%, #3b82f6 35% 70%, #ef4444 70% 100%); display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 10px rgba(0,0,0,0.2);">
                                <section class="centro-vacio-dona" style="width: 85px; height: 85px; background: #0f172a; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: background-color 0.3s ease-in-out;">
                                    <small style="color:#64748b; font-size:11px; text-transform: uppercase; letter-spacing: 0.5px;">Total</small>
                                    <strong id="monto-total-grafico" style="font-size:16px; color: #ffffff;">$0</strong>
                                </section>
                            </div>
                        </section>
                        <ul id="leyenda-dinamica-gastos" style="list-style: none; padding: 0; margin: 0;"></ul>
                    </section>

                    <!-- Lista de Movimientos con botón recuperado/Tarea de Angie -->
                    <section class="panel">
                        <div class="encabezado-movimientos">
                            <h2>Movimientos recientes</h2>
                            <button class="btn-ver-todos" aria-label="Ver Todos">Ver todos</button>
                        </div>
                        <section id="listaMovimientos"></section>
                    </section>
                </section>

            </div>
        </main>
    </div>
    <script type="module" src="js/main.js"></script>
</body>

</html>
